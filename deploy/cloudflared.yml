# Cloudflare Tunnel config for the roster host.
# Fill in after `cloudflared tunnel create bsdraft-roster` (see deploy/roster-tunnel.md).
#
#   568ba9ff-ecab-4e90-b180-33629771225e     printed by `tunnel create` (also the credentials json filename)
#   mitchelltatge             your macOS username
#   roster.brawldraft.com   a subdomain on a domain in your Cloudflare account
#
# The tunnel agent reads this via `cloudflared tunnel --config <this file> run`.

tunnel: 568ba9ff-ecab-4e90-b180-33629771225e
credentials-file: /Users/mitchelltatge/.cloudflared/568ba9ff-ecab-4e90-b180-33629771225e.json

ingress:
  # Expose ONLY the roster endpoint to the public internet; the rest of the home API
  # (recommend, top_picks, reference…) stays unreachable through the tunnel — those are
  # served by Render. Defense in depth on top of the locked CORS origin.
  - hostname: roster.brawldraft.com
    path: ^/api/roster
    service: http://127.0.0.1:8000
  - hostname: roster.brawldraft.com
    service: http_status:404
  # Catch-all (required last rule).
  - service: http_status:404
