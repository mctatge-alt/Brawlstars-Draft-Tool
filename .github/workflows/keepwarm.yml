name: keep-warm

# Ping the free Render backend so it doesn't sleep (free instances spin down after ~15 min idle).
# Set repo variable RENDER_HEALTH_URL to "<your-render-url>/api/health"
#   (repo Settings -> Secrets and variables -> Actions -> Variables -> New repository variable).
# Note: GitHub disables scheduled workflows after 60 days with no repo activity.

on:
  schedule:
    - cron: "*/12 * * * *"   # every ~12 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.RENDER_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            echo "RENDER_HEALTH_URL not set — skipping (configure it to enable keep-warm)."
            exit 0
          fi
          curl -fsS --max-time 30 "$URL" && echo "  …warm"
