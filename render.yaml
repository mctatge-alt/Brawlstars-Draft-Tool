# Render Blueprint for the draft API (free tier).
# Deploy: Render dashboard -> New -> Blueprint -> pick this repo. Spec: https://render.com/docs/blueprint-spec
#
# Free instances sleep after ~15 min idle (cold start ~30-60s); .github/workflows/keepwarm.yml
# pings /api/health to keep it warm. The API has no torch dependency — it serves the model in
# NumPy from winprob.npz and syncs both the match data (DATA_URL) and the model (MODEL_URL)
# from the GitHub Release at runtime, hot-swapping each without a redeploy.
services:
  - type: web
    name: bsdraft-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements-serve.txt
    startCommand: uvicorn bsdraft.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"   # adjust if Render reports this patch is unavailable
      - key: PYTHONPATH
        value: backend
      - key: DATA_URL
        value: https://github.com/mctatge-alt/Brawlstars-Draft-Tool/releases/download/data-latest/matches.jsonl.gz
      - key: MODEL_URL
        value: https://github.com/mctatge-alt/Brawlstars-Draft-Tool/releases/download/data-latest/winprob.npz
      - key: REFRESH_SECONDS
        value: "600"
